# Scraper Freshness Check — GitHub Actions Workflow
#
# Checks whether data sources are fresh and opens a GitHub Issue if any are stale or failing.
#
# Setup:
#   1. Copy this file to .github/workflows/scraper-freshness-check.yml
#   2. Set the CHECK_COMMAND to match your project (see options below)
#   3. Add required secrets (DATABASE_URL or none for file-based)
#   4. Adjust the schedule to match your freshness windows
#
# The workflow runs the freshness check script and, if any sources are stale,
# opens (or updates) a GitHub Issue with a markdown table of the problems.

name: Scraper Freshness Check

on:
  schedule:
    # Run every 6 hours. Adjust based on your shortest freshness window.
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allow manual trigger from Actions tab

env:
  # ---------- CONFIGURE THESE ----------

  # Option A: Database-backed scrapers
  # CHECK_COMMAND: >-
  #   python scripts/check_scraper_freshness.py
  #   --db-url "${{ secrets.DATABASE_URL }}"
  #   --format github

  # Option B: File-based pipelines
  # CHECK_COMMAND: >-
  #   python scripts/check_scraper_freshness.py
  #   --health-dir data/
  #   --format github

  # Option C: Both
  # CHECK_COMMAND: >-
  #   python scripts/check_scraper_freshness.py
  #   --db-url "${{ secrets.DATABASE_URL }}"
  #   --health-dir data/
  #   --format github

  # Default: file-based (change to match your project)
  CHECK_COMMAND: >-
    python scripts/check_scraper_freshness.py
    --health-dir data/
    --format github

  ISSUE_LABEL: "data-freshness"

jobs:
  check-freshness:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          # psycopg2-binary is needed only for database-backed checks
          pip install psycopg2-binary 2>/dev/null || true

      - name: Run freshness check
        id: check
        continue-on-error: true
        run: |
          set +e
          OUTPUT=$(${{ env.CHECK_COMMAND }} 2>&1)
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          # Write output to file for the issue body (handles multiline)
          echo "$OUTPUT" > /tmp/freshness-report.txt

          if [ $EXIT_CODE -eq 0 ]; then
            echo "All data sources are fresh."
          else
            echo "::warning::Stale or failing data sources detected"
            echo "$OUTPUT"
          fi

      - name: Close existing issue if all fresh
        if: steps.check.outputs.exit_code == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: '${{ env.ISSUE_LABEL }}',
              state: 'open',
            });
            for (const issue of issues.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: 'All data sources are now fresh. Closing automatically.',
              });
            }

      - name: Open or update issue if stale
        if: steps.check.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/freshness-report.txt', 'utf8');
            const title = 'Data Freshness Alert: stale or failing scrapers';
            const body = `${report}\n\n---\n_Auto-generated by scraper freshness check at ${new Date().toISOString()}_`;

            // Check for existing open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: '${{ env.ISSUE_LABEL }}',
              state: 'open',
            });

            if (issues.data.length > 0) {
              // Update existing issue with latest report
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: body,
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['${{ env.ISSUE_LABEL }}'],
              });
            }
