# curated.yaml
#
# Skills bundled with Letta Code Desktop.
#
# This file is the source of truth for which skills ship with the desktop
# app. The desktop build reads this file, copies each listed skill into
# apps/code-desktop/resources/skills/curated/, and generates the
# skills-curated-cache.json manifest served by the Electron proxy.
#
# Editing rules
# -------------
# - `id` must be unique and stable. It's used as the on-disk name under
#   ~/.letta/skills/<id> when a user installs the skill, and as the key
#   the UI uses to identify "installed" skills. Don't rename without a
#   migration plan.
# - `path` is the skill directory relative to the repo root (where
#   SKILL.md lives).
# - `shortDescription` appears on the skill card in the Skills view.
#   Keep it under ~70 characters.
# - `iconLarge` and `iconSmall` are paths inside the skill directory.
#   PNG (large) + SVG (small) is conventional; other formats work too.
#
# Adding a skill
# --------------
# 1. Land the skill in this repo with a SKILL.md, an `assets/` dir with
#    icons, and a LICENSE.
# 2. Add an entry below.
# 3. Open a PR. Acceptance depends on utility, polish, and fit.
#
# Removing a skill
# ----------------
# Delete the entry. The skill can still live in the repo — it just
# won't be bundled with the desktop app by default.

version: 1

